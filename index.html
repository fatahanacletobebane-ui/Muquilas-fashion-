<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biblioteca Islam Moçambique - Sahih al-Bukhari</title>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Inter', sans-serif;
            background: #f5f0e8;
            color: #2c3e2d;
            min-height: 100vh;
        }
        
        .header {
            background: linear-gradient(135deg, #1a5f3f 0%, #2d8a5e 100%);
            padding: 1.2rem 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            color: white;
        }
        
        .logo { display: flex; align-items: center; gap: 1rem; }
        .logo-icon {
            width: 45px; height: 45px; background: rgba(255,255,255,0.15);
            border-radius: 10px; display: flex; align-items: center; justify-content: center;
            font-size: 1.4rem; border: 2px solid rgba(255,255,255,0.2);
        }
        .logo h1 { font-size: 1.2rem; font-weight: 700; }
        .logo p { font-size: 0.7rem; opacity: 0.7; }
        
        .main { display: flex; max-width: 1400px; margin: 0 auto; min-height: calc(100vh - 80px); }
        
        .sidebar {
            width: 300px; background: white; border-right: 1px solid #d4c9b8;
            padding: 1.5rem; overflow-y: auto; max-height: calc(100vh - 80px);
            position: sticky; top: 0;
        }
        
        .sidebar h3 {
            font-size: 0.8rem; color: #1a5f3f; text-transform: uppercase;
            letter-spacing: 1px; margin-bottom: 1rem;
        }
        
        .book-list { display: flex; flex-direction: column; gap: 0.5rem; }
        
        .book-item {
            padding: 0.9rem; border-radius: 10px; cursor: pointer;
            transition: all 0.2s; border: 2px solid transparent; background: #f5f0e8;
        }
        .book-item:hover { border-color: #2d8a5e; }
        .book-item.active {
            background: linear-gradient(135deg, #1a5f3f 0%, #2d8a5e 100%);
            color: white; border-color: #1a5f3f;
        }
        .book-item.active .book-ar { color: rgba(255,255,255,0.8); }
        .book-item.active .book-count { color: rgba(255,255,255,0.7); }
        
        .book-num { font-size: 0.7rem; font-weight: 700; color: #c9a84c; margin-bottom: 0.2rem; }
        .book-item.active .book-num { color: #e8d5a3; }
        .book-title { font-weight: 600; font-size: 0.85rem; }
        .book-ar {
            font-family: 'Amiri', serif; font-size: 0.8rem; color: #5a6b5c;
            direction: rtl; margin-top: 0.2rem;
        }
        .book-count { font-size: 0.7rem; color: #5a6b5c; margin-top: 0.3rem; }
        
        .content { flex: 1; padding: 2rem; overflow-y: auto; }
        
        .book-header {
            background: white; border-radius: 16px; padding: 2rem; margin-bottom: 1.5rem;
            box-shadow: 0 2px 12px rgba(26,95,63,0.08); border: 1px solid #d4c9b8;
            text-align: center; position: relative; overflow: hidden;
        }
        .book-header::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0; height: 4px;
            background: linear-gradient(90deg, #c9a84c, #e8d5a3);
        }
        .book-header .num {
            display: inline-block; background: linear-gradient(135deg, #1a5f3f, #2d8a5e);
            color: white; padding: 0.3rem 0.9rem; border-radius: 15px;
            font-size: 0.75rem; font-weight: 700; margin-bottom: 0.8rem;
        }
        .book-header h2 { font-size: 1.5rem; color: #0d3d28; margin-bottom: 0.3rem; }
        .book-header .ar {
            font-family: 'Amiri', serif; font-size: 1.3rem; color: #1a5f3f; direction: rtl;
        }
        .book-header .divider {
            width: 50px; height: 3px; background: linear-gradient(90deg, #c9a84c, #e8d5a3);
            margin: 0.8rem auto; border-radius: 2px;
        }
        
        .progress { margin-bottom: 1.5rem; }
        .progress-bar {
            height: 6px; background: #e8e0d4; border-radius: 3px; overflow: hidden;
        }
        .progress-fill {
            height: 100%; background: linear-gradient(90deg, #1a5f3f, #2d8a5e);
            border-radius: 3px; transition: width 0.4s ease;
        }
        .progress-text { text-align: center; margin-top: 0.4rem; font-size: 0.75rem; color: #5a6b5c; }
        
        .hadith-card {
            background: white; border-radius: 16px; padding: 2rem;
            box-shadow: 0 2px 12px rgba(26,95,63,0.08); border: 1px solid #d4c9b8;
            animation: fadeIn 0.4s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .hadith-header {
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 1.2rem; flex-wrap: wrap; gap: 0.8rem;
        }
        .hadith-badge {
            background: linear-gradient(135deg, #1a5f3f, #2d8a5e);
            color: white; padding: 0.4rem 0.8rem; border-radius: 20px;
            font-size: 0.75rem; font-weight: 600;
        }
        .hadith-chapter { font-size: 1rem; font-weight: 600; color: #0d3d28; flex: 1; }
        .hadith-num {
            background: #e8d5a3; color: #0d3d28; padding: 0.3rem 0.8rem;
            border-radius: 15px; font-size: 0.75rem; font-weight: 700;
        }
        
        .hadith-arabic {
            font-family: 'Amiri', serif; font-size: 1.3rem; line-height: 2;
            color: #0d3d28; background: linear-gradient(135deg, #f8f9f5, #f0f4ec);
            padding: 1.2rem; border-radius: 12px; margin-bottom: 1.2rem;
            direction: rtl; text-align: right; border-right: 3px solid #2d8a5e;
        }
        
        .hadith-portuguese {
            font-size: 0.95rem; line-height: 1.8; color: #2c3e2d;
            padding: 1.2rem; background: #f5f0e8; border-radius: 12px;
            margin-bottom: 1.2rem; border-left: 3px solid #c9a84c;
        }
        
        .hadith-meta {
            display: flex; flex-wrap: wrap; gap: 1rem; padding-top: 1.2rem;
            border-top: 1px solid #e8e0d4; font-size: 0.8rem; color: #5a6b5c;
        }
        .hadith-meta strong { color: #0d3d28; }
        
        .nav {
            display: flex; justify-content: center; align-items: center;
            gap: 1rem; margin-top: 1.5rem; padding: 1.2rem;
            background: white; border-radius: 16px;
            box-shadow: 0 2px 12px rgba(26,95,63,0.08); border: 1px solid #d4c9b8;
        }
        .nav-btn {
            padding: 0.7rem 1.8rem; border: none; border-radius: 10px;
            font-size: 0.9rem; font-weight: 600; cursor: pointer;
            transition: all 0.2s; font-family: 'Inter', sans-serif;
        }
        .nav-btn.prev {
            background: #f5f0e8; color: #1a5f3f; border: 2px solid #2d8a5e;
        }
        .nav-btn.prev:hover:not(:disabled) { background: #1a5f3f; color: white; }
        .nav-btn.next {
            background: linear-gradient(135deg, #1a5f3f, #2d8a5e); color: white;
        }
        .nav-btn.next:hover:not(:disabled) {
            box-shadow: 0 4px 12px rgba(26,95,63,0.3);
        }
        .nav-btn:disabled { opacity: 0.4; cursor: not-allowed; }
        
        .nav-counter {
            font-size: 0.9rem; font-weight: 700; color: #1a5f3f; min-width: 100px; text-align: center;
        }
        .nav-counter span { color: #c9a84c; font-size: 1.2rem; }
        
        .loading {
            text-align: center; padding: 3rem; color: #5a6b5c;
        }
        .loading::after {
            content: ''; display: inline-block; width: 30px; height: 30px;
            border: 3px solid #d4c9b8; border-top-color: #1a5f3f;
            border-radius: 50%; animation: spin 1s linear infinite; margin-left: 0.5rem;
            vertical-align: middle;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        .error {
            background: #fef2f2; border: 1px solid #fecaca; color: #dc2626;
            padding: 1.2rem; border-radius: 12px; text-align: center; margin: 1.5rem 0;
        }
        
        /* Responsivo */
        @media (max-width: 900px) {
            .main { flex-direction: column; }
            .sidebar { width: 100%; max-height: none; position: relative; border-right: none; border-bottom: 1px solid #d4c9b8; }
            .book-list { flex-direction: row; overflow-x: auto; padding-bottom: 0.5rem; }
            .book-item { min-width: 220px; }
            .content { padding: 1rem; }
            .hadith-card { padding: 1.2rem; }
            .hadith-arabic { font-size: 1.1rem; }
        }
    </style>
</head>

// ============================================
// ESTADO
// ============================================
let currentBook = 31;
let currentHadith = 0;

// ============================================
// FUNÇÕES DE RENDER
// ============================================
function renderBooks() {
    const list = document.getElementById('bookList');
    list.innerHTML = '';
    
    Object.keys(booksData).sort((a,b) => parseInt(a)-parseInt(b)).forEach(id => {
        const b = booksData[id];
        const div = document.createElement('div');
        div.className = 'book-item ' + (parseInt(id) === currentBook ? 'active' : '');
        div.onclick = () => selectBook(parseInt(id));
        div.innerHTML = `
            <div class="book-num">Livro ${id}</div>
            <div class="book-title">${b.title}</div>
            <div class="book-ar">${b.arabic}</div>
            <div class="book-count">📄 ${b.hadiths.length} hadiths</div>
        `;
        list.appendChild(div);
    });
}

function renderHadith() {
    const area = document.getElementById('contentArea');
    const book = booksData[currentBook];
    const h = book.hadiths[currentHadith];
    const total = book.hadiths.length;
    const pct = ((currentHadith + 1) / total * 100).toFixed(1);
    
    area.innerHTML = `
        <div class="book-header">
            <div class="num">Livro ${currentBook}</div>
            <h2>${book.title}</h2>
            <div class="ar">${book.arabic}</div>
            <div class="divider"></div>
            <div style="color:#5a6b5c;font-size:0.85rem;">📖 ${total} hadiths</div>
        </div>
        
        <div class="progress">
            <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
            <div class="progress-text">${currentHadith + 1} de ${total} hadiths (${pct}%)</div>
        </div>
        
        <div class="hadith-card">
            <div class="hadith-header">
                <span class="hadith-badge">⭐ Sahih al-Bukhari</span>
                <div class="hadith-chapter">${h.chapter}</div>
                <span class="hadith-num">#${currentHadith + 1}</span>
            </div>
            <div class="hadith-arabic">${h.arabic}</div>
            <div class="hadith-portuguese">${h.portuguese}</div>
            <div class="hadith-meta">
                <span>👤 Narrador: <strong>${h.narrator}</strong></span>
                <span>📚 ${h.reference}</span>
            </div>
        </div>
        
        <div class="nav">
            <button class="nav-btn prev" onclick="prev()" ${currentHadith===0?'disabled':''}>◀ Anterior</button>
            <div class="nav-counter"><span>${currentHadith + 1}</span> / ${total}</div>
            <button class="nav-btn next" onclick="next()" ${currentHadith===total-1?'disabled':''}>Próximo ▶</button>
        </div>
    `;
}

// ============================================
// NAVEGAÇÃO
// ============================================
function next() {
    if (currentHadith < booksData[currentBook].hadiths.length - 1) {
        currentHadith++;
        renderHadith();
    }
}

function prev() {
    if (currentHadith > 0) {
        currentHadith--;
        renderHadith();
    }
}

function selectBook(id) {
    if (booksData[id]) {
        currentBook = id;
        currentHadith = 0;
        renderBooks();
        renderHadith();
        window.scrollTo({top:0, behavior:'smooth'});
    }
}

// ============================================
// CARREGAR LIVROS ADICIONAIS DO GITHUB/JSON
// ============================================
async function loadAdditionalBooks() {
    const status = document.getElementById('loadStatus');
    
    // Tenta carregar livros 32-65 automaticamente
    for (let i = 32; i <= 65; i++) {
        try {
            const response = await fetch(`${CONFIG.dataPath}livro${i}.json`);
            if (response.ok) {
                const data = await response.json();
                Object.assign(booksData, data);
                status.innerHTML += `✅ Livro ${i} carregado<br>`;
            }
        } catch(e) {
            // Livro não encontrado — ignora silenciosamente
        }
    }
    
    // Também tenta carregar de uma lista específica se configurada
    for (const file of CONFIG.additionalBooks) {
        try {
            const response = await fetch(`${CONFIG.dataPath}${file}`);
            if (response.ok) {
                const data = await response.json();
                Object.assign(booksData, data);
            }
        } catch(e) {}
    }
    
    renderBooks();
}

// ============================================
// TECLADO
// ============================================
document.addEventListener('keydown', e => {
    if (e.key === 'ArrowRight') next();
    if (e.key === 'ArrowLeft') prev();
});

// ============================================
// INICIALIZAR
// ============================================
renderBooks();
renderHadith();
loadAdditionalBooks();
</script>
</body>
</html>
