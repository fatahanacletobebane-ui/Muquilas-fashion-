<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biblioteca Islam Moçambique - Sahih Bukhari</title>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #1b4332;
            --secondary: #2d6a4f;
            --accent: #d4af37;
            --text: #2d3436;
            --bg: #f0f2f5;
            --white: #ffffff;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg);
            margin: 0;
            padding-bottom: 50px;
        }

        header {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: var(--white);
            padding: 40px 20px;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .container {
            max-width: 900px;
            margin: 30px auto;
            padding: 0 20px;
        }

        /* Grade de Livros */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
        }

        .book-card {
            background: var(--white);
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            cursor: pointer;
            transition: 0.3s;
            border-left: 5px solid var(--accent);
        }

        .book-card:hover { transform: translateY(-5px); }

        .book-card h3 { margin: 0; color: var(--primary); }

        .arabic-title {
            font-family: 'Amiri', serif;
            font-size: 1.4rem;
            color: var(--secondary);
            text-align: right;
            margin: 10px 0;
        }

        /* Leitor */
        #readerSection {
            display: none;
            background: var(--white);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .btn-back {
            background: #eee;
            border: none;
            padding: 8px 15px;
            border-radius: 20px;
            cursor: pointer;
            margin-bottom: 20px;
        }

        .arabic-text {
            font-family: 'Amiri', serif;
            font-size: 1.8rem;
            text-align: right;
            direction: rtl;
            line-height: 1.8;
            margin: 25px 0;
        }

        .portuguese-text {
            font-size: 1.1rem;
            line-height: 1.6;
            margin-bottom: 25px;
        }

        .progress-bar {
            height: 6px;
            background: #eee;
            border-radius: 3px;
            margin: 15px 0;
        }

        #progressFill {
            height: 100%;
            background: var(--accent);
            width: 0%;
            transition: 0.3s;
        }

        .nav-btns {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 30px;
        }

        .nav-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 8px;
            cursor: pointer;
        }

        .nav-btn:disabled { background: #ccc; }
    </style>
</head>
<body>

<header>
    <h1>Biblioteca Islam Moçambique</h1>
    <p>Sahih Al-Bukhari</p>
</header>

<div class="container">
    <div id="bookSelector" class="grid-container"></div>

    <div id="readerSection">
        <button class="btn-back" onclick="backToBooks()">← Voltar</button>
        <h2 id="currentBookTitle" style="color: var(--primary);"></h2>
        <div class="progress-bar"><div id="progressFill"></div></div>
        
        <div id="hadithContent"></div>

        <div class="nav-btns">
            <button id="prevBtn" class="nav-btn" onclick="changeHadith(-1)">Anterior</button>
            <span id="counter">Hadith <span id="cur">0</span> de <span id="total">0</span></span>
            <button id="nextBtn" class="nav-btn" onclick="changeHadith(1)">Próximo</button>
        </div>
    </div>
</div>

    33: {

    hadiths: [
        {
            chapter: "Prova do dono",
            arabic: `حَدَّثَنَا آدَمُ، حَدَّثَنَا شُعْبَةُ، وَحَدَّثَنِي مُحَمَّدُ بْنُ بَشَّارٍ، حَدَّثَنَا غُنْدَرٌ، حَدَّثَنَا شُعْبَةُ، عَنْ سَلَمَةَ، سَمِعْتُ سُوَيْدَ بْنَ غَفَلَةَ، قَالَ لَقِيتُ أُبَىَّ بْنَ كَعْبٍ ـ رضى الله عنه ـ فَقَالَ أَخَذْتُ صُرَّةً مِائَةَ دِينَارٍ فَأَتَيْتُ النَّبِيَّ صلى الله عليه وسلم فَقَالَ "عَرِّفْهَا حَوْلاً". فَعَرَّفْتُهَا حَوْلَهَا فَلَمْ أَجِدْ مَنْ يَعْرِفُهَا، ثُمَّ أَتَيْتُهُ فَقَالَ "عَرِّفْهَا حَوْلاً" فَعَرَّفْتُهَا فَلَمْ أَجِدْ، ثُمَّ أَتَيْتُهُ ثَلاَثًا فَقَالَ "احْفَظْ وِعَاءَهَا وَعَدَدَهَا وَوِكَاءَهَا، فَإِنْ جَاءَ صَاحِبُهَا، وَإِلاَّ فَاسْتَمْتِعْ بِهَا"`,
            portuguese: "Narrado por Ubai bin Ka'b: Encontrei uma bolsa contendo cem dinares. Então fui ao Profeta (ﷺ) e informei-o sobre isso. Ele disse: 'Faça anúncio público sobre ela por um ano.' Eu o fiz, mas ninguém apareceu para reivindicá-la. Então fui ao Profeta novamente e ele disse: 'Faça anúncio público por mais um ano.' Eu o fiz, mas ninguém apareceu. Fui a ele pela terceira vez e ele disse: 'Guarde o recipiente e a corda que é usada para amarrá-la e conte o dinheiro que contém. Se o dono vier, dê-a a ele; caso contrário, utilize-a.'",
            narrator: "Ubai bin Ka'b",
            reference: "Sahih al-Bukhari 2426 - Livro 45, Hadith 1"
        },
        {
            chapter: "Camelos perdidos",
            arabic: `حَدَّثَنَا عَمْرُو بْنُ عَبَّاسٍ، حَدَّثَنَا عَبْدُ الرَّحْمَنِ، حَدَّثَنَا سُفْيَانُ، عَنْ رَبِيعَةَ، حَدَّثَنِي يَزِيدُ، مَوْلَى الْمُنْبَعِثِ عَنْ زَيْدِ بْنِ خَالِدٍ الْجُهَنِيِّ ـ رضى الله عنه ـ قَالَ جَاءَ أَعْرَابِيٌّ النَّبِيَّ صلى الله عليه وسلم فَسَأَلَهُ عَمَّا يَلْتَقِطُهُ فَقَالَ "عَرِّفْهَا سَنَةً، ثُمَّ احْفَظْ عِفَاصَهَا وَوِكَاءَهَا، فَإِنْ جَاءَ أَحَدٌ يُخْبِرُكَ بِهَا، وَإِلاَّ فَاسْتَنْفِقْهَا". قَالَ يَا رَسُولَ اللَّهِ فَضَالَّةُ الْغَنَمِ قَالَ "لَكَ أَوْ لأَخِيكَ أَوْ لِلذِّئْبِ". قَالَ ضَالَّةُ الإِبِلِ فَتَمَعَّرَ وَجْهُ النَّبِيِّ صلى الله عليه وسلم. فَقَالَ "مَا لَكَ وَلَهَا، مَعَهَا حِذَاؤُهَا وَسِقَاؤُهَا، تَرِدُ الْمَاءَ وَتَأْكُلُ الشَّجَرَ"`,
            portuguese: "Narrado por Zaid bin Khalid: Um beduíno foi ao Profeta (ﷺ) e perguntou sobre pegar algo perdido. O Profeta disse: 'Anuncie-o publicamente por um ano. Guarde sua descrição e a corda com que está amarrado. Se alguém vier e reivindicá-lo, dê-lhe; caso contrário, gaste-o.' O beduíno perguntou: 'E a ovelha perdida?' O Profeta disse: 'É para você, para seu irmão, ou para o lobo.' O beduíno perguntou: 'E o camelo perdido?' O rosto do Profeta ficou sério e disse: 'Você não tem nada a ver com ele. Ele tem seus pés e seu recipiente de água, e chegará à água e comerá árvores.'",

            arabic: `حَدَّثَنَا عَبْدُ اللَّهِ بْنُ يُوسُفَ، أَخْرَنَا مَالِكٌ، عَنْ نَافِعٍ، عَنْ عَبْدِ اللَّهِ بْنِ كَعْبِ بْنِ مَالِكٍ، عَنْ كَعْبٍ ـ رضى الله عنه ـ أَنَّهُ تَقَاضَى ابْنَ أَبِي حَدْرَدٍ دَيْنًا كَانَ لَهُ عَلَيْهِ فِي الْمَسْجِدِ، فَارْتَفَعَتْ أَصْوَاتُهُمَا حَتَّى سَمِعَهَا رَسُولُ اللَّهِ صلى الله عليه وسلم وَهْوَ فِي بَيْتِهِ، فَخَرَجَ إِلَيْهِمَا، حَتَّى كَشَفَ سِجْفَ حُجْرَتِهِ فَنَادَى "يَا كَعْبُ". قَالَ لَبَّيْكَ يَا رَسُولَ اللَّهِ. قَالَ "ضَعْ مِنْ دَيْنِكَ هَذَا" فَأَوْمَأَ إِلَيْهِ، أَىِ الشَّطْرَ. قَالَ لَقَدْ فَعَلْتُ يَا رَسُولَ اللَّهِ. قَالَ "قُمْ فَاقْضِهِ"`,

            arabic: `حَدَّثَنَا قُتَيْبَةُ بْنُ سَعِيدٍ، حَدَّثَنَا إِسْمَاعِيلُ بْنُ جَعْفَرٍ، عَنْ رَبِيعَةَ بْنِ أَبِي عَبْدِ الرَّحْمَنِ، عَنْ يَزِيدَ، مَوْلَى الْمُنْبَعِثِ عَنْ زَيْدِ بْنِ خَالِدٍ الْجُهَنِيِّ ـ رضى الله عنه ـ أَنَّ رَجُلاً سَأَلَ رَسُولَ اللَّهِ صلى الله عليه وسلم عَنِ اللُّقَطَةِ قَالَ "عَرِّفْهَا سَنَةً، ثُمَّ اعْرِفْ وِكَاءَهَا وَعِفَاصَهَا، ثُمَّ اسْتَنْفِقْ بِهَا، فَإِنْ جَاءَ رَبُّهَا فَأَدِّهَا إِلَيْهِ". قَالُوا يَا رَسُولَ اللَّهِ فَضَالَّةُ الْغَنَمِ قَالَ "خُذْهَا فَإِنَّمَا هِيَ لَكَ أَوْ لأَخِيكَ أَوْ لِلذِّئْبِ". قَالَ يَا رَسُولَ اللَّهِ، فَضَالَّةُ الإِبِلِ قَالَ فَغَضِبَ رَسُولُ اللَّهِ صلى الله عليه وسلم حَتَّى احْمَرَّتْ وَجْنَتَاهُ ـ أَوِ احْمَرَّ وَجْهُهُ ـ ثُمَّ قَالَ "مَا لَكَ وَلَهَا، مَعَهَا حِذَاؤُهَا وَسِقَاؤُهَا، حَتَّى يَلْقَاهَا رَبُّهَا"`,

   35: {
    title: "Livro das Parcerias (Ash-Shirkah)",
    arabic: "كتاب الشركة",
    hadiths: [
        {
            chapter: "Divisão de comida e provisões (Al-Ash'ariyun)",
            arabic: `حَدَّثَنَا أَبُو نُعَيْمٍ، حَدَّثَنَا زَكَرِيَّاءُ، قَالَ سَمِعْتُ عَامِرًا، يَقُولُ حَدَّثَنِي أَبُو بُرْدَةَ، عَنْ أَبِي مُوسَى، قَالَ قَالَ النَّبِيُّ صلى الله عليه وسلم "إِنَّ الأَشْعَرِيِّينَ إِذَا أَرْمَلُوا فِي الْغَزْوِ، أَوْ قَلَّ طَعَامُ عِيَالِهِمْ بِالْمَدِينَةِ، جَمَعُوا مَا كَانَ عِنْدَهُمْ فِي ثَوْبٍ وَاحِدٍ، ثُمَّ اقتسموا بَيْنَهُمْ فِي إِنَاءٍ وَاحِدٍ بِالسَّوِيَّةِ، فَهُمْ مِنِّي وَأَنَا مِنْهُمْ"`,
            portuguese: "Narrado por Abu Musa: O Profeta (ﷺ) disse: 'Quando os Ash'ariyun ficam sem comida em uma batalha, ou quando a comida de suas famílias acaba, eles reúnem tudo o que têm em um único lençol e dividem igualmente. Eles são de mim e eu sou deles.'",
            narrator: "Abu Musa",
            reference: "Sahih al-Bukhari 2486"
        },
        {
            chapter: "Parceria em Ouro e Prata (Comércio)",
            arabic: `حَدَّثَنَا عَمْرُو بْنُ خَالِدٍ، حَدَّثَنَا زُهَيْرٌ، حَدَّثَنَا أَبُو إِسْحَاقَ، قَالَ سَأَلْتُ الْبَرَاءَ بْنَ عَازِبٍ وَزَيْدَ بْنَ أَرْقَمَ عَنِ الصَّرْفِ، فَقَالاَ كُنَّا تَاجِرَيْنِ عَلَى عَهْدِ رَسُولِ اللَّهِ صلى الله عليه وسلم فَسَأَلْنَا رَسُولَ اللَّهِ صلى الله عليه وسلم عَنِ الصَّرْفِ فَقَالَ "إِنْ كَانَ يَدًا بِيَدٍ فَلاَ بَأْسَ، وَإِنْ كَانَ نَسَاءً فَلاَ يَصْلُحُ"`,
            portuguese: "Narrado por Zaid bin Arqam e Al-Bara: Éramos sócios comerciantes no tempo do Mensageiro de Allah (ﷺ). Perguntamos a ele sobre o câmbio de moedas e ele disse: 'Se for feito de mão em mão (na hora), não há problema; mas se houver adiamento (crédito), não é permitido.'",
            narrator: "Zaid bin Arqam",
            reference: "Sahih al-Bukhari 2487"
        },
        {
            chapter: "Não separar o que está unido em parceria",
            arabic: `حَدَّثَنَا مُحَمَّدُ بْنُ عَبْدِ اللَّهِ بْنِ مُثَنَّى، قَالَ حَدَّثَنِي أَبِي، قَالَ حَدَّثَنِي ثُمَامَةُ، أَنَّ أَنَسًا، حَدَّثَهُ أَنَّ أَبَا بَكْرٍ ـ رضى الله عنه ـ كَتَبَ لَهُ الَّتِي فَرَضَ رَسُولُ اللَّهِ صلى الله عليه وسلم "وَلاَ يُجْمَعُ بَيْنَ مُفْتَرِقٍ، وَلاَ يُفَرَّقُ بَيْنَ مُجْتَمِعٍ، خَشْيَةَ الصَّدَقَةِ، وَمَا كَانَ مِنْ خَلِيطَيْنِ فَإِنَّهُمَا يَتَرَاجَعَانِ بَيْنَهُمَا بِالسَّوِيَّةِ"`,
            portuguese: "Narrado por Anas: Abu Bakr escreveu para ele o que o Mensageiro de Allah (ﷺ) ordenou: 'O que está separado não deve ser reunido, e o que está reunido em parceria não deve ser separado para fins de caridade (Zakat). O que pertence a dois sócios deve ser tratado igualmente entre eles.'",
            narrator: "Anas bin Malik",
            reference: "Sahih al-Bukhari 2488"
        },
        {
            chapter: "Parceria em animais e ovelhas",
            arabic: `حَدَّثَنَا عَبْدُ اللَّهِ بْنُ مَسْلَمَةَ، عَنْ مَالِكٍ، عَنْ نَافِعٍ، عَنِ ابْنِ عُمَرَ ـ رضى الله عنهما ـ أَنَّ رَسُولَ اللَّهِ صلى الله عليه وسلم قَالَ "مَنْ أَعْتَقَ شِرْكًا لَهُ فِي عَبْدٍ فَكَانَ لَهُ مَالٌ يَبْلُغُ ثَمَنَهُ، قُوِّمَ عَلَيْهِ قِيمَةَ الْعَدْلِ"`,
            portuguese: "Narrado por Ibn Umar: O Mensageiro de Allah (ﷺ) disse: 'Se alguém libertar sua parte de um escravo comum e tiver dinheiro para o valor total, ele deve pagar aos sócios o valor justo para libertar o restante.'",
            narrator: "Ibn Umar",
            reference: "Sahih al-Bukhari 2492"
        },
        {
            chapter: "O Sócio tem preferência (Ash-Shuf'a)",
            arabic: `حَدَّثَنَا مُسَدَّدٌ، حَدَّثَنَا عَبْدُ الْوَاحِدِ، حَدَّثَنَا مَعْمَرٌ، عَنِ الزُّهْرِيِّ، عَنْ أَبِي سَلَمَةَ بْنِ عَبْدِ الرَّحْمَنِ، عَنْ جَابِرِ بْنِ عَبْدِ اللَّهِ ـ رضى الله عنهما ـ قَالَ قَضَى رَسُولُ اللَّهِ صلى الله عليه وسلم بِالشُّفْعَةِ فِي كُلِّ مَا لَمْ يُقْسَمْ، فَإِذَا وَقَعَتِ الْحُدُودُ وَصُرِّفَتِ الطُّرُقُ فَلاَ شُفْعَةَ`,
            portuguese: "Narrado por Jabir bin Abdullah: O Profeta (ﷺ) decretou o direito de preferência (Shuf'a) em toda propriedade comum que ainda não foi dividida. Mas uma vez que os limites são fixados e as estradas traçadas, não há mais direito de preferência.",
            narrator: "Jabir bin Abdullah",
            reference: "Sahih al-Bukhari 2495"
        },
        {
            chapter: "Parceria e sorteio (A metáfora do navio)",
            arabic: `حَدَّثَنَا أَبُو نُعَيْمٍ، حَدَّثَنَا زَكَرِيَّاءُ، قَالَ سَمِعْتُ عَامِرًا، يَقُولُ سَمِعْتُ النُّعْمَانَ بْنَ بَشِيرٍ ـ رضى الله عنهما ـ عَنِ النَّبِيِّ صلى الله عليه وسلم قَالَ "مَثَلُ الْقَائِمِ عَلَى حُدُودِ اللَّهِ وَالْوَاقِعِ فِيهَا كَمَثَلِ قَوْمٍ اسْتَهَمُوا عَلَى سَفِينَةٍ..."`,
            portuguese: "Narrado por An-Nu'man bin Bashir: O Profeta (ﷺ) deu o exemplo de sócios em um navio: se os do andar de baixo tentarem furar o casco para pegar água sem subir, e os do andar de cima não os impedirem, todos morrerão. Se os impedirem, todos serão salvos.",
            narrator: "An-Nu'man bin Bashir",
            reference: "Sahih al-Bukhari 2493"
        }
    ]
},    
    
let currentBook = null;
let currentIdx = 0;

function init() {
    const grid = document.getElementById('bookSelector');
    for (let id in booksData) {
        grid.innerHTML += `
            <div class="book-card" onclick="openBook(${id})">
                <h3>Livro ${id}</h3>
                <p>${booksData[id].title}</p>
                <div class="arabic-title">${booksData[id].arabic}</div>
            </div>`;
    }
}

function openBook(id) {
    currentBook = id;
    currentIdx = 0;
    document.getElementById('bookSelector').style.display = 'none';
    document.getElementById('readerSection').style.display = 'block';
    renderHadith();
}

function renderHadith() {
    const book = booksData[currentBook];
    const h = book.hadiths[currentIdx];
    document.getElementById('currentBookTitle').innerText = book.title;
    document.getElementById('hadithContent').innerHTML = `
        <p><strong>Relatado por:</strong> ${h.narrator}</p>
        <div class="arabic-text">${h.arabic}</div>
        <div class="portuguese-text">${h.portuguese}</div>
        <small>Referência: Bukhari ${h.ref}</small>
    `;
    document.getElementById('cur').innerText = currentIdx + 1;
    document.getElementById('total').innerText = book.hadiths.length;
    document.getElementById('progressFill').style.width = ((currentIdx+1)/book.hadiths.length)*100 + '%';
    document.getElementById('prevBtn').disabled = currentIdx === 0;
    document.getElementById('nextBtn').disabled = currentIdx === book.hadiths.length - 1;
}

function changeHadith(dir) {
    currentIdx += dir;
    renderHadith();
    window.scrollTo(0,0);
}

function backToBooks() {
    document.getElementById('readerSection').style.display = 'none';
    document.getElementById('bookSelector').style.display = 'grid';
}

init();
</script>
